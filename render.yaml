services:
  - type: web
    name: thrive-ai-visibility
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install --build-from-source
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SERPAPI_KEY
        sync: false
      - key: PERPLEXITY_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: EXTRA_ALLOWED_ORIGINS
        sync: false
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
